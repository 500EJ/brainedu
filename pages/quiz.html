<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="robots" content="noindex" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Fundamentals Quiz</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="../css/quiz.css" />
  </head>
  <body>
    <h1>Brain Fundamentals Quiz</h1>
    <h2 class="question"></h2>
    <h3 class="question-number"></h3>
    <p class="message"></p>
    <section class="answers">
      <div class="answer-group">
        <button class="answer" id="A"></button>
        <button class="answer" id="B"></button>
      </div>
      <div class="answer-group">
        <button class="answer" id="C"></button>
        <button class="answer" id="D"></button>
      </div>
    </section>
    <button class="action next-question">Next question >></button>
    <a href="./quiz.html" class="retake"
      ><button class="action retake">Retake quiz</button></a
    >
    <a href="../index.html" class="return-home"
      ><button class="action return-home">Return home</button></a
    >

    <script src="../scripts/quiz.js" type="module"></script>
  </body>
</html>
